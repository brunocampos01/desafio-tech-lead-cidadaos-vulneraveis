name: pic_1746
version: 1.0.0
config-version: 2

profile: pic_1746

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - dbt_packages

on-run-start:
  - "INSTALL spatial;"
  - "LOAD spatial;"

vars:
  partition_start: "2023-01-01"

models:
  pic_1746:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    mart:
      +materialized: table
      +schema: mart

seeds:
  pic_1746:
    secretaria_tipo_mapping:
      +column_types:
        tipo: varchar
        secretaria: varchar
        confianca: varchar
        notas: varchar
